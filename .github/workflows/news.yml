name: AI News Digest

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch: {}

jobs:
  post-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install feedparser requests google-genai

      - run: python news_bot.py
        env:
          DISCORD_WEBHOOK_URL: ${{secrets.DISCORD_WEBHOOK_URL}}
          GAMING_DISCORD_WEBHOOK_URL: ${{secrets.GAMING_DISCORD_WEBHOOK_URL}}
          TECH_SRBija_DISCORD_WEBHOOK_URL: ${{secrets.TECH_SRBija_DISCORD_WEBHOOK_URL}}
          GEMINI_API_KEY: ${{secrets.GEMINI_API_KEY}}
